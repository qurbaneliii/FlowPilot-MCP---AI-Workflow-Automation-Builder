services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flowpilot
      POSTGRES_PASSWORD: flowpilot
      POSTGRES_DB: flowpilot
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowpilot -d flowpilot"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: development
      APP_VERSION: 0.1.0
      LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://flowpilot:flowpilot@postgres:5432/flowpilot
      DEFAULT_USER_ID: 00000000-0000-0000-0000-000000000001
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MCP_SERVER_URL: ${OPENAI_MCP_SERVER_URL:-}
      GITHUB_MCP_SERVER_URL: ${GITHUB_MCP_SERVER_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      FILESYSTEM_MCP_ROOT: /workspace
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=3)); raise SystemExit(0 if data.get('status') == 'ok' and data.get('dependencies', {}).get('database') == 'ok' else 1)",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: npm run dev -- --hostname 0.0.0.0

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next:
